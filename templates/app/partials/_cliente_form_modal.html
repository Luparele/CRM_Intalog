{% load django_bootstrap5 %}

<form id="prospect-form">
    {% csrf_token %}
    
    <div class="modal-header">
        <h5 class="modal-title">Novo Prospect</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    
    <div class="modal-body">
        <div id="form-errors" class="alert alert-danger d-none"></div>
        
        {# Campo CNPJ com botão de busca #}
        <div class="mb-3">
            <label for="id_cnpj" class="form-label">CNPJ</label>
            <div class="input-group">
                <input type="text" name="cnpj" id="id_cnpj" class="form-control" maxlength="18" placeholder="00.000.000/0000-00">
                <button type="button" class="btn btn-outline-primary" id="btn-buscar-cnpj" onclick="buscarCNPJ()">
                    <i class="bi bi-search"></i> Buscar
                </button>
            </div>
            <div id="cnpj-feedback" class="form-text text-muted">Digite o CNPJ e clique em Buscar.</div>
        </div>
        
        {% bootstrap_field form.razao_social %}
        {% bootstrap_field form.nome_contato %}
        {% bootstrap_field form.telefone_contato %}
        {% bootstrap_field form.email_contato %}
    </div>
    
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btn-salvar-prospect">
            <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
            Salvar Prospect
        </button>
    </div>
</form>

<script>
// Função global para buscar CNPJ
function buscarCNPJ() {
    console.log('Função buscarCNPJ chamada');
    
    var cnpjInput = document.getElementById('id_cnpj');
    var razaoSocialInput = document.getElementById('id_razao_social');
    var btnBuscar = document.getElementById('btn-buscar-cnpj');
    var feedback = document.getElementById('cnpj-feedback');
    
    if (!cnpjInput || !razaoSocialInput) {
        console.error('Elementos não encontrados');
        alert('Erro: elementos do formulário não encontrados');
        return;
    }
    
    var cnpj = cnpjInput.value.replace(/\D/g, '');
    console.log('CNPJ limpo:', cnpj);

    if (cnpj.length !== 14) {
        alert('CNPJ deve conter 14 dígitos. Atual: ' + cnpj.length);
        cnpjInput.focus();
        return;
    }

    var url = '/api/consulta-cnpj/' + cnpj + '/';
    console.log('URL da API:', url);
    
    // Feedback visual
    btnBuscar.disabled = true;
    btnBuscar.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Buscando...';
    razaoSocialInput.value = 'Aguarde, consultando...';
    razaoSocialInput.disabled = true;
    cnpjInput.disabled = true;
    feedback.textContent = 'Consultando base de dados...';
    feedback.className = 'form-text text-info';

    fetch(url)
        .then(function(response) {
            console.log('Response status:', response.status);
            return response.json();
        })
        .then(function(data) {
            console.log('Dados recebidos:', data);
            if (data.error) {
                feedback.textContent = 'Erro: ' + data.error;
                feedback.className = 'form-text text-danger';
                razaoSocialInput.value = '';
            } else {
                razaoSocialInput.value = data.razao_social || '';
                feedback.textContent = 'Dados encontrados com sucesso!';
                feedback.className = 'form-text text-success';
            }
        })
        .catch(function(error) {
            console.error('Erro na consulta:', error);
            feedback.textContent = 'Erro na consulta: ' + error.message;
            feedback.className = 'form-text text-danger';
            razaoSocialInput.value = '';
        })
        .finally(function() {
            btnBuscar.disabled = false;
            btnBuscar.innerHTML = '<i class="bi bi-search"></i> Buscar';
            razaoSocialInput.disabled = false;
            cnpjInput.disabled = false;
        });
}

// Máscara de CNPJ e submit do form
(function() {
    var cnpjInput = document.getElementById('id_cnpj');
    var form = document.getElementById('prospect-form');
    var btnSalvar = document.getElementById('btn-salvar-prospect');
    var spinner = btnSalvar ? btnSalvar.querySelector('.spinner-border') : null;
    var errorsDiv = document.getElementById('form-errors');

    // Máscara de CNPJ
    if (cnpjInput) {
        cnpjInput.addEventListener('input', function() {
            var value = this.value.replace(/\D/g, '');
            if (value.length > 14) value = value.slice(0, 14);
            
            if (value.length > 12) {
                this.value = value.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
            } else if (value.length > 8) {
                this.value = value.replace(/(\d{2})(\d{3})(\d{3})(\d+)/, '$1.$2.$3/$4');
            } else if (value.length > 5) {
                this.value = value.replace(/(\d{2})(\d{3})(\d+)/, '$1.$2.$3');
            } else if (value.length > 2) {
                this.value = value.replace(/(\d{2})(\d+)/, '$1.$2');
            } else {
                this.value = value;
            }
        });
        
        // Enter no campo CNPJ dispara busca
        cnpjInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                buscarCNPJ();
            }
        });
    }
    
    // Submissão do form
    if (form) {
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (spinner) spinner.classList.remove('d-none');
            if (btnSalvar) btnSalvar.disabled = true;
            if (errorsDiv) errorsDiv.classList.add('d-none');
            
            var formData = new FormData(form);
            
            fetch('{% url "app:salvar-cliente-prospeccao" %}', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(function(response) {
                if (response.ok) {
                    return response.text();
                } else {
                    return response.text().then(function(html) {
                        throw { type: 'validation', html: html };
                    });
                }
            })
            .then(function(html) {
                var clienteContainer = document.getElementById('cliente-select-container');
                if (clienteContainer) {
                    clienteContainer.innerHTML = html;
                }
                
                var secondaryModalEl = document.getElementById('secondary-modal');
                var secondaryModal = bootstrap.Modal.getInstance(secondaryModalEl);
                if (secondaryModal) {
                    secondaryModal.hide();
                }
            })
            .catch(function(error) {
                if (error.type === 'validation') {
                    document.getElementById('secondary-modal-content').innerHTML = error.html;
                } else {
                    console.error('Erro:', error);
                    if (errorsDiv) {
                        errorsDiv.textContent = 'Erro ao salvar. Tente novamente.';
                        errorsDiv.classList.remove('d-none');
                    }
                }
            })
            .finally(function() {
                if (spinner) spinner.classList.add('d-none');
                if (btnSalvar) btnSalvar.disabled = false;
            });
        });
    }
})();

console.log('Script do modal de prospect carregado com sucesso');
</script>
